[app]
name = "myapp"
environment = "development"
debug = false
version = "1.0.0"

[database]
host = "localhost"
port = 5432
user = "dbuser"
password = ""
name = "myapp_db"
max_connections = 25
connect_timeout = "30s"
enable_ssl = false

[server]
host = "0.0.0.0"
port = 8080
read_timeout = "30s"
write_timeout = "30s"
shutdown_timeout = "10s"
tls_enabled = false

[logging]
level = "info"
format = "json"
output = "stdout"

[features]
enable_metrics = true
enable_tracing = false
enable_rate_limits = true
