---
## Example Configuration File
#  Copy this to config.yaml and customize for your needs

app:
  name: "my-app-name"
  environment: "development"  # development, staging, production, or test
  debug: false
  version: "1.0.0"

database:
  host: "localhost"
  port: 5432
  user: "dbuser"
  password: ""  # Use environment variable APP_DATABASE_PASSWORD instead
  name: "myapp_db"
  max_connections: 25
  connect_timeout: "30s"
  enable_ssl: false

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  shutdown_timeout: "10s"
  tls_enabled: false

logging:
  level: "info"  # debug, info, warn, or error
  format: "json"  # json or text
  output: "stdout"  # stdout, stderr, or file path

features:
  enable_metrics: true
  enable_tracing: false
  enable_rate_limits: true
